{{/*
두 가지 주입 모드:
  (1) externalSecrets.enabled=true : External Secrets Operator가 K8s Secret을
      AWS Secrets Manager / Vault 등에서 동적으로 생성. 여기서는 ExternalSecret CR만 생성.
  (2) externalSecrets.enabled=false: Helm이 직접 Secret을 생성 — value는 반드시
      values.yaml의 .Values.secrets.data 로 주입(또는 --set-file). git에 커밋 금지.
*/}}

{{- if not .Values.externalSecrets.enabled }}
{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-gateway.fullname" . }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep  # helm uninstall 시에도 보존
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.app }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.external.passwordSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  {{- range $key, $value := .Values.secrets.db }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
{{- else }}
# ExternalSecrets Operator 모드 — AWS Secrets Manager 등 외부 저장소에서 주입
#
# pre-install/pre-upgrade hook 으로 선언하여 migration Job (hook-weight=-5) 보다
# 먼저 생성되도록 한다. ESO 가 비동기로 K8s Secret 을 sync 하므로 migration Job
# 은 initContainer 로 Secret 존재를 대기 (templates/jobs/migration.yaml 참조).
# hook-delete-policy 는 before-hook-creation 만 사용 — success 시 보존해야
# 일반 Deployment 가 Secret 을 참조 가능.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "llm-gateway.fullname" . }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
  target:
    name: {{ include "llm-gateway.fullname" . }}-app
    creationPolicy: Owner
  data:
    - secretKey: virtual_key_encryption_key
      remoteRef:
        key: "{{ .Values.externalSecrets.secretPathPrefix }}{{ .Values.global.environment }}/app"
        property: virtual_key_encryption_key
    - secretKey: nextauth_secret
      remoteRef:
        key: "{{ .Values.externalSecrets.secretPathPrefix }}{{ .Values.global.environment }}/app"
        property: nextauth_secret
    - secretKey: jwt_jwks_cache_key
      remoteRef:
        key: "{{ .Values.externalSecrets.secretPathPrefix }}{{ .Values.global.environment }}/app"
        property: jwt_jwks_cache_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.database.external.passwordSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
  target:
    name: {{ .Values.database.external.passwordSecretName }}
    creationPolicy: Owner
  data:
    # Application user (gateway) 비번 — 모든 서비스가 사용.
    - secretKey: {{ .Values.database.external.passwordSecretKey }}
      remoteRef:
        key: "{{ .Values.externalSecrets.secretPathPrefix }}{{ .Values.global.environment }}/db"
        property: password
    # Master user (postgres_admin) 비번 — migration Job 이 init SQL 실행 + gateway 유저 생성용.
    # masterPasswordRemoteKey 설정 시 그 시크릿(예: RDS 관리형 rds!cluster-<uuid>)에서 직접
    # 가져와 로테이션 드리프트 원천 차단. 미설정 시 기존 "<prefix><env>/db:master_password".
    - secretKey: {{ .Values.database.external.masterPasswordSecretKey }}
      remoteRef:
        key: {{ .Values.database.external.masterPasswordRemoteKey | default (printf "%s%s/db" .Values.externalSecrets.secretPathPrefix .Values.global.environment) | quote }}
        property: {{ .Values.database.external.masterPasswordRemoteProperty | default "master_password" | quote }}
{{- if .Values.redis.external.passwordSecretName }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.redis.external.passwordSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
  target:
    name: {{ .Values.redis.external.passwordSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.redis.external.passwordSecretKey }}
      remoteRef:
        key: "{{ .Values.externalSecrets.secretPathPrefix }}{{ .Values.global.environment }}/redis"
        property: password
{{- end }}
{{- end }}
