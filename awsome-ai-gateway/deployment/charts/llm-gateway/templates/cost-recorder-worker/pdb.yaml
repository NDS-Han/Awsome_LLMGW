{{- if and .Values.costRecorderWorker.enabled .Values.costRecorderWorker.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "llm-gateway.fullname" . }}-cost-recorder-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.componentLabels" (dict "root" . "component" "cost-recorder-worker") | nindent 4 }}
spec:
  minAvailable: {{ .Values.costRecorderWorker.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "llm-gateway.selectorLabels" (dict "root" . "component" "cost-recorder-worker") | nindent 6 }}
{{- end }}
