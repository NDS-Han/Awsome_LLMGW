{{- if and .Values.costRecorderWorker.enabled .Values.costRecorderWorker.autoscaling.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "llm-gateway.fullname" . }}-cost-recorder-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.componentLabels" (dict "root" . "component" "cost-recorder-worker") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "llm-gateway.fullname" . }}-cost-recorder-worker
  minReplicas: {{ .Values.costRecorderWorker.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.costRecorderWorker.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.costRecorderWorker.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
