{{- if and .Values.gatewayProxy.enabled .Values.gatewayProxy.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "llm-gateway.fullname" . }}-gateway-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.componentLabels" (dict "root" . "component" "gateway-proxy") | nindent 4 }}
spec:
  {{- if .Values.gatewayProxy.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.gatewayProxy.podDisruptionBudget.minAvailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "llm-gateway.selectorLabels" (dict "root" . "component" "gateway-proxy") | nindent 6 }}
{{- end }}
