{{- if and .Values.notificationWorker.enabled .Values.notificationWorker.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "llm-gateway.fullname" . }}-notification-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.componentLabels" (dict "root" . "component" "notification-worker") | nindent 4 }}
spec:
  minAvailable: {{ .Values.notificationWorker.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "llm-gateway.selectorLabels" (dict "root" . "component" "notification-worker") | nindent 6 }}
{{- end }}
