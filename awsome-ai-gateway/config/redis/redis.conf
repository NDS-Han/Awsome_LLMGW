# Redis 설정 — LLM Gateway (개발 환경)
maxmemory 256mb
maxmemory-policy volatile-lru
lua-time-limit 1000
# RDB/AOF 비활성 (캐시 전용)
save ""
appendonly no
# 연결 설정
tcp-keepalive 300
timeout 0
