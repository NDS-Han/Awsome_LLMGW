AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AgentOps E-commerce Analytics Demo — Cognito User Pool + Groups
  (AIM310, AWS Seoul Summit 2026).
  Provisions a Cognito User Pool with admin-create-only user management,
  a public client with SRP + REFRESH auth flows, 3 groups (team-alpha,
  team-beta, admin), and a custom resource Lambda to seed 6 test users.

Parameters:
  UserPoolName:
    Type: String
    Default: agentops-ecommerce-users
    Description: Cognito User Pool name.

  AppClientName:
    Type: String
    Default: agentops-web-client
    Description: App client name for the React dashboard.

  CallbackUrl:
    Type: String
    Default: http://localhost:3000/auth/callback
    Description: OAuth callback URL for the web app (update for production).

Resources:
  # --- Cognito User Pool ---

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref UserPoolName
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Mutable: true
        - Name: role
          AttributeDataType: String
          Mutable: true
          DeveloperOnlyAttribute: false
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: OPTIONAL
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserAttributeUpdateSettings:
        AttributesRequireVerificationBeforeUpdate:
          - email
      EnabledMfas:
        - SOFTWARE_TOKEN_MFA
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT

  # --- User Pool Client (public, SRP + REFRESH) ---

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Ref AppClientName
      UserPoolId: !Ref UserPool
      GenerateSecret: false  # Public client for web/mobile
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - email
        - openid
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Ref CallbackUrl
      LogoutURLs:
        - http://localhost:3000
        - http://localhost:3000/logout
      SupportedIdentityProviders:
        - COGNITO
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      AccessTokenValidity: 1
      IdTokenValidity: 1
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

  # --- Groups ---

  TeamAlphaGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: team-alpha
      UserPoolId: !Ref UserPool
      Description: Team Alpha members and admins
      Precedence: 10

  TeamBetaGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: team-beta
      UserPoolId: !Ref UserPool
      Description: Team Beta members and admins
      Precedence: 20

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      UserPoolId: !Ref UserPool
      Description: System administrators
      Precedence: 1

  # --- Custom Resource Lambda Role ---

  CognitoSeederRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoSeeder
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminDeleteUser
                Resource: !GetAtt UserPool.Arn

  # --- Custom Resource Lambda (ZipFile inline) ---

  CognitoSeederFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${UserPoolName}-seeder"
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt CognitoSeederRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          cognito = boto3.client('cognito-idp')

          # Test user definitions: email, password, groups, custom:role
          TEST_USERS = [
              {
                  'email': 'alice@demo.local',
                  'password': 'Demo1234!',
                  'groups': ['team-alpha'],
                  'role': 'member'
              },
              {
                  'email': 'bob@demo.local',
                  'password': 'Demo1234!',
                  'groups': ['team-alpha'],
                  'role': 'member'
              },
              {
                  'email': 'charlie@demo.local',
                  'password': 'Demo1234!',
                  'groups': ['team-alpha'],
                  'role': 'team_admin'
              },
              {
                  'email': 'dave@demo.local',
                  'password': 'Demo1234!',
                  'groups': ['team-beta'],
                  'role': 'member'
              },
              {
                  'email': 'eve@demo.local',
                  'password': 'Demo1234!',
                  'groups': ['team-beta'],
                  'role': 'team_admin'
              },
              {
                  'email': 'admin@demo.local',
                  'password': 'Demo1234!',
                  'groups': ['admin'],
                  'role': 'admin'
              }
          ]

          def create_users(user_pool_id):
              """Create test users, set passwords, and add to groups."""
              for user_data in TEST_USERS:
                  email = user_data['email']
                  password = user_data['password']
                  groups = user_data['groups']
                  role = user_data['role']

                  try:
                      # Check if user exists; if so, delete and recreate
                      try:
                          cognito.admin_get_user(UserPoolId=user_pool_id, Username=email)
                          logger.info(f"Deleting existing user: {email}")
                          cognito.admin_delete_user(UserPoolId=user_pool_id, Username=email)
                      except cognito.exceptions.UserNotFoundException:
                          pass

                      # Create user with admin_create_user
                      logger.info(f"Creating user: {email}")
                      cognito.admin_create_user(
                          UserPoolId=user_pool_id,
                          Username=email,
                          UserAttributes=[
                              {'Name': 'email', 'Value': email},
                              {'Name': 'email_verified', 'Value': 'true'},
                              {'Name': 'custom:role', 'Value': role}
                          ],
                          TemporaryPassword=password,
                          MessageAction='SUPPRESS'
                      )

                      # Set permanent password
                      logger.info(f"Setting permanent password for: {email}")
                      cognito.admin_set_user_password(
                          UserPoolId=user_pool_id,
                          Username=email,
                          Password=password,
                          Permanent=True
                      )

                      # Add user to groups
                      for group in groups:
                          logger.info(f"Adding {email} to group: {group}")
                          cognito.admin_add_user_to_group(
                              UserPoolId=user_pool_id,
                              Username=email,
                              GroupName=group
                          )

                  except Exception as e:
                      logger.error(f"Error creating user {email}: {str(e)}")
                      raise

              logger.info("All test users created successfully")

          def lambda_handler(event, context):
              """CloudFormation custom resource handler."""
              try:
                  logger.info(f"Event: {json.dumps(event)}")
                  request_type = event['RequestType']
                  user_pool_id = event['ResourceProperties']['UserPoolId']

                  if request_type == 'Create' or request_type == 'Update':
                      create_users(user_pool_id)
                      cfnresponse.send(
                          event,
                          context,
                          cfnresponse.SUCCESS,
                          {'Message': 'Users created successfully'},
                          f"CognitoSeeder-{user_pool_id}"
                      )
                  elif request_type == 'Delete':
                      # On stack delete, just return success (UserPool deletion cleans up users)
                      cfnresponse.send(
                          event,
                          context,
                          cfnresponse.SUCCESS,
                          {'Message': 'Stack deletion in progress'},
                          f"CognitoSeeder-{user_pool_id}"
                      )
                  else:
                      cfnresponse.send(
                          event,
                          context,
                          cfnresponse.FAILED,
                          {'Message': f'Unknown RequestType: {request_type}'},
                          context.aws_request_id
                      )

              except Exception as e:
                  logger.error(f"Exception: {str(e)}")
                  cfnresponse.send(
                      event,
                      context,
                      cfnresponse.FAILED,
                      {'Message': str(e)},
                      context.aws_request_id
                  )

  # --- Custom Resource to invoke the seeder Lambda ---

  CognitoSeederCustomResource:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - TeamAlphaGroup
      - TeamBetaGroup
      - AdminGroup
    Properties:
      ServiceToken: !GetAtt CognitoSeederFunction.Arn
      UserPoolId: !Ref UserPool

Outputs:
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !Ref UserPool
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolId"

  UserPoolArn:
    Description: Cognito User Pool ARN.
    Value: !GetAtt UserPool.Arn
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolArn"

  AppClientId:
    Description: Cognito App Client ID for web/mobile applications.
    Value: !Ref UserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-AppClientId"

  CognitoRegion:
    Description: AWS region where the User Pool is located.
    Value: !Ref AWS::Region
    Export:
      Name: !Sub "${AWS::StackName}-CognitoRegion"

  UserPoolDomain:
    Description: Cognito User Pool domain for OAuth flows (can be created separately).
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  SeederFunctionArn:
    Description: ARN of the custom resource Lambda function.
    Value: !GetAtt CognitoSeederFunction.Arn
