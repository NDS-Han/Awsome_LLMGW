{{- if and .Values.adminUi.enabled .Values.adminUi.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "llm-gateway.fullname" . }}-admin-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.componentLabels" (dict "root" . "component" "admin-ui") | nindent 4 }}
spec:
  minAvailable: {{ .Values.adminUi.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "llm-gateway.selectorLabels" (dict "root" . "component" "admin-ui") | nindent 6 }}
{{- end }}
